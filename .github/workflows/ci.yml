name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same ref cancels an in-flight run for it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22 (active LTS) and 24 (current). Both ship native TS type-stripping
        # unflagged, which the test/typecheck scripts rely on.
        node: [22, 24]
    name: check (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # npm ci builds better-sqlite3 from source; ubuntu runners carry the
      # python/make/g++ toolchain node-gyp needs, so no extra setup.
      - run: npm ci

      - run: npm run check
